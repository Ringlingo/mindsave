name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-python:
    name: Python SDK Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest

      # ── v3.5 legacy tests (standalone scripts) ──────────────
      - name: Run Python SDK tests
        run: python tests/test_python_sdk.py

      - name: Run Failure Graph tests
        run: python tests/test_failure_graph.py

      - name: Run Constraint Compressor tests
        run: python tests/test_constraint_compressor.py

      - name: Run Integration tests
        run: python tests/test_integration_fixes.py

      - name: Run comprehensive v3.5 tests
        run: python tests/test_v34_comprehensive.py

      - name: Run Dashboard HTML tests
        run: python tests/test_dashboard_html.py

      # ── v4.0/v4.1 tests (pytest) ────────────────────────────
      - name: Run v4 SDK tests (pytest)
        run: |
          python -m pytest \
            tests/test_v4_vocabulary.py \
            tests/test_v4_segment.py \
            tests/test_v4_query_parser.py \
            tests/test_v4_indexer.py \
            tests/test_v4_restorer.py \
            tests/test_integration_v4.py \
            tests/test_v4_migrator.py \
            tests/test_v4_retriever.py \
            tests/test_v4_rerank.py \
            tests/test_v4_embedding_client.py \
            -q -s --tb=short

      - name: Build package
        run: |
          pip install build twine
          python -m build
        working-directory: sdk/python

  test-typescript:
    name: TypeScript SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci
        working-directory: sdk/typescript

      - name: Build TypeScript
        run: npm run build
        working-directory: sdk/typescript

      - name: Type check
        run: npx tsc --noEmit
        working-directory: sdk/typescript

  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v14
        with:
          globs: |
            README.md
            ROADMAP.md
            SKILL.md
            CHANGELOG.md
            SECURITY.md
            sdk/README.md
          config: .markdownlint.json
