name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-python:
    name: Python SDK Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.8", "3.11"]
        exclude:
          - os: windows-latest
            python-version: "3.8"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Python SDK tests
        run: python tests/test_python_sdk.py

      - name: Run Failure Graph tests
        run: python tests/test_failure_graph.py

      - name: Run Constraint Compressor tests
        run: python tests/test_constraint_compressor.py

      - name: Run Integration tests
        run: python tests/test_integration_fixes.py

      - name: Build package
        run: |
          pip install build twine
          python -m build
        working-directory: sdk/python

  test-typescript:
    name: TypeScript SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci
        working-directory: sdk/typescript

      - name: Build TypeScript
        run: npm run build
        working-directory: sdk/typescript

      - name: Type check
        run: npx tsc --noEmit
        working-directory: sdk/typescript

  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v14
        with:
          globs: "**/*.md"
